			<p>To<br/>
			<b>My father</b><br/>
			I dedicate this book<br/>
			as expressing some of the principles of<br/>
			justice and mercy which,<br/>
			by precept and example, he has<br/>
			instilled into my<br/>
			breast<br/>
			from early childhood.</p>
